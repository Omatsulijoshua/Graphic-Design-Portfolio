<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JOSHGRAPHIX_WORLD Admin Login</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="styles.css?v=20260705-3">
  </head>
  <body>
    <section class="login-screen" data-login-screen>
      <form class="login-card" data-login-form>
        <a class="brand" href="index.html">
          <span class="brand-mark"><img src="assets/joshgraphix-logo.jpg" alt=""></span>
          <span><strong>JOSHGRAPHIX_WORLD</strong><small>Admin Login</small></span>
        </a>
        <div>
          <p class="eyebrow">Private access</p>
          <h1>Admin Login</h1>
          <p class="hero-copy">Sign in to continue to the JOSHGRAPHIX_WORLD dashboard.</p>
        </div>
        <label>Email<input name="email" type="email" autocomplete="username" required></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required></label>
        <button class="button primary" type="submit">Login</button>
        <p class="form-status" data-login-status role="status"></p>
        <a class="button ghost" href="index.html">Back to Website</a>
      </form>
    </section>
    <script src="login.js?v=20260705-3"></script>
  </body>
</html>
