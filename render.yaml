services:
  - type: web
    name: joshgraphics-portfolio-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://joshgraphics-design-portfolio.vercel.app
